
unbindall

/////////////////////////
///// ALIASES

alias		+chattoggle	"bind enter say_team"
alias		-chattoggle	"bind enter say"

alias		voicetoggle	"voicetoggleon"
alias		voicetoggleon	"+voicerecord; alias voicetoggle voicetoggleoff"
alias		voicetoggleoff	"-voicerecord; alias voicetoggle voicetoggleon"


/////////////////////////
///// BINDS

	// SLOTS
bind		1		"slot1"
bind		2		"slot2"
bind		3		"slot3"
bind		4		"slot4"
bind		5		"slot5"
bind		6		"slot6"
bind		7		"slot7"
bind		8		"slot8"
bind		9		"slot9"
bind		0		"slot10"

	// CLASS / LOADOUT SWAP
bind		kp_end		"joinclass scout"
bind		kp_downarrow	"joinclass soldier"
bind		kp_pgdn		"joinclass pyro"
bind		kp_leftarrow	"joinclass demoman"
bind		kp_5		"joinclass heavyweapons"
bind		kp_rightarrow	"joinclass engineer"
bind		kp_home		"joinclass medic"
bind		kp_uparrow	"joinclass sniper"
bind		kp_pgup		"joinclass spy"
bind		kp_ins		"joinclass random"
bind		kp_plus		"load_itempreset 0"
bind		kp_slash	"load_itempreset 1"
bind		kp_multiply	"load_itempreset 2"
bind		kp_minus	"load_itempreset 3"

	// MOVEMENT
bind		w		"+mf"
bind		s		"+mb"
bind		a		"+ml"
bind		d		"+mr"

bind		space		"+jump"
bind		shift		"+duck"

	// COMBAT
bind		mouse1		"+attack"
bind		mouse2		"+attack2"
bind		mouse3		"slot3"
bind		mouse4		"+use_action_slot_item"
bind		mouse5		"+attack3"
bind		mwheelup	"slot1"
bind		mwheeldown	"slot2"

	// COMMUNICATIONS
bind		enter		"say"
bind		rshift		"+chattoggle"
bind		ctrl		"+voicerecord"
bind		alt		"voicetoggle"
bind		z		"voicemenu1"
bind		x		"voicemenu2"
bind		c		"voicemenu3"

	// F1-F12
bind		f1		"callvote"
bind		f3		"kill"
bind		f4		"explode"
bind		f9		"disconnect"
bind		f10		"quit"

	// MISC
bind		tab		"+taunt"
bind		capslock	"+showscores"
bind		f		"+inspect"
bind		r		"+reload"
bind	 	,		"open_charinfo_direct"
bind	 	.		"changeclass"
bind	 	/		"changeteam"
bind		[		"cl_trigger_first_notification"
bind		]		"cl_decline_first_notification"
bind		\		"record fix; stop; hud_reloadscheme"
bind		b		"lastdisguise"
bindtoggle	q		"r_drawviewmodel"

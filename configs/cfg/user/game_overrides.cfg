// Commands here will run before every class config

/////////////////////////
///// LOAD CUSTOM SCRIPTS

unbindall

exec user/voicetoggle
exec user/nulltalk
exec user/classswap
exec user/slots
exec user/settings


/////////////////////////
///// BINDS

	// MOVEMENT
bind	w			+mf
bind	s			+mb
bind	a			+ml
bind	d			+mr
bind	space		+jump
bind	shift		+duck

	// COMBAT
bind	mouse1		+attack
bind	mouse2		+attack2
bind	mouse3		slot3
bind	mouse4		+use_action_slot_item
bind	mouse5		none
bind	r			+reload

bind	mwheeldown	slot2
bind	mwheelup	slot1

	// COMMUNICATIONS
bind	enter		say
bind	rshift		+chattoggle
bind	ctrl		+voicerecord

	// MISC
bind		tab			+taunt
bind		capslock	+showscores
bind		f1			callvote
bind		f3			kill
bind		f4			explode
bind		f9			disconnect
bind		f10			quit
bind	 	,			open_charinfo_direct
bind	 	.			changeclass
bind	 	/			changeteam
bind		f			+inspect
bindtoggle	alt			r_drawviewmodel
bind		t			"impulse 201"
bind		j			cl_trigger_first_notification
bind		k			cl_decline_first_notification
bind		v			"voicetoggle"

// Commands here will run before every class config

unbindall

/////////////////////////
///// LOAD CUSTOM SCRIPTS

exec user/voicetoggle
exec user/nulltalk
exec user/classswap
exec user/slots


/////////////////////////
///// BINDS

	// MOVEMENT
bind		w		"+mf"
bind		s		"+mb"
bind		a		"+ml"
bind		d		"+mr"

bind		space		"+jump"
bind		shift		"+duck"

	// COMBAT
bind		mouse1		"+attack"
bind		mouse2		"+attack2"
bind		mouse3		"slot3"
bind		mouse4		"+use_action_slot_item"
bind		mouse5		"none"
bind		mwheelup	"slot1"
bind		mwheeldown	"slot2"

	// COMMUNICATIONS
bind		enter		"say"
bind		rshift		"+chattoggle"
bind		ctrl		"+voicerecord"
bind		alt		"voicetoggle"

	// F1-F12
bind		f1		"callvote"
bind		f3		"kill"
bind		f4		"explode"
bind		f9		"disconnect"
bind		f10		"quit"

	// MISC
bind		tab		"+taunt"
bind		capslock	"+showscores"
bind		f		"+inspect"
bind		r		"+reload"
bind	 	,		"open_charinfo_direct"
bind	 	.		"changeclass"
bind	 	/		"changeteam"
bind		[		"cl_trigger_first_notification"
bind		]		"cl_decline_first_notification"
bind		\		"record fix; stop; hud_reloadscheme"
